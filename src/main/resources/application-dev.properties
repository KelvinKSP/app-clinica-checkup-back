# Perfil de Desenvolvimento - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/clinica_dev
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate — Valida o schema criado pelo Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway — gerenciado manualmente via FlywayConfig.java para garantir
# execução ANTES da validação do Hibernate (necessário no Spring Boot 4.x)
spring.flyway.enabled=false

# Logging
logging.level.org.flywaydb=INFO
logging.level.org.springframework.security=DEBUG
