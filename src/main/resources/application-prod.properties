# Perfil de Produção
# Configurações do Banco de Dados PostgreSQL (Exemplo)
# Use variáveis de ambiente para valores sensíveis
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appcheckup_prod}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password_exemplo}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Segurança: Em produção, o Spring Security usará as configurações padrão de autenticação
# a menos que configurado explicitamente no SecurityConfig
